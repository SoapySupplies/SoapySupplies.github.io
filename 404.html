<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  
  <!-- Favicon from new domain -->
  <link rel="icon" href="https://soapysupplies.vercel.app/favicon.ico" type="image/x-icon" />
  <link rel="shortcut icon" href="https://soapysupplies.vercel.app/favicon.ico" type="image/x-icon" />

  <!-- SEO Authority Transfer -->
  <link rel="canonical" href="https://soapysupplies.vercel.app/" />
  <title>Soapy Supplies</title>
  <meta name="description" content="Trusted B2B wholesale supplier of sustainable, premium soap-making ingredients and organic bases. Perfect for professional artisans and businesses." />
  <meta name="keywords" content="wholesale soap supplies, soapmaking ingredients, bulk coconut oil, organic soap base, soap supplies wholesale" />
  <meta name="theme-color" content="#FAF6F2" />
  <meta name="robots" content="noindex, follow" />

  <!-- Tailwind + Fonts (preconnected) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg: #FAF6F2;
      --text: #2D2926;
      --muted: #6F6258;
      --accent: #7A5E4D;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0) 34%),
        radial-gradient(circle at 18% 80%, rgba(122,94,77,0.06) 0%, rgba(122,94,77,0) 36%),
        radial-gradient(circle at 84% 74%, rgba(182,142,116,0.05) 0%, rgba(182,142,116,0) 34%),
        linear-gradient(180deg, #FAF6F2 0%, #F8F1EB 100%);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      opacity: 0; /* Flash protection */
      transition: opacity 0.15s ease;
    }

    .btn-primary {
      background: var(--text);
      color: #fff;
    }
    .btn-primary:hover {
      background: #1f1c1a;
      transform: translateY(-1px);
    }

    .bubble-layer, .bubble-top-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .bubble-layer { z-index: 0; }
    .bubble-top-layer { z-index: 30; mix-blend-mode: screen; }

    .bubble {
      position: absolute;
      border-radius: 50%;
      will-change: transform, opacity;
      filter: blur(0.5px);
    }

    .bubble.bg {
      background: radial-gradient(circle at 32% 28%, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.75) 18%, rgba(255,255,255,0.35) 38%, rgba(240,248,255,0.18) 58%, rgba(200,230,255,0.08) 78%, transparent 92%);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: inset 0 0 28px rgba(255,255,255,0.9), inset -18px -18px 28px rgba(180,220,255,0.25), 0 0 18px rgba(255,255,255,0.6), 0 8px 16px rgba(0,0,0,0.08);
      opacity: 0.42;
      animation: floatUpBg infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }

    .bubble.top {
      background: radial-gradient(circle at 26% 24%, rgba(255,255,255,0.99) 0%, rgba(255,255,255,0.88) 12%, rgba(240,255,255,0.55) 26%, rgba(220,240,255,0.22) 48%, rgba(180,225,255,0.08) 68%, transparent 88%);
      border: 1.5px solid rgba(255,255,255,0.85);
      box-shadow: inset 0 0 32px rgba(255,255,255,0.95), inset -22px -20px 32px rgba(200,235,255,0.35), 0 0 22px rgba(255,255,255,0.75), 0 10px 20px rgba(0,0,0,0.1);
      animation: floatUpTop infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }

    @keyframes floatUpBg {
      0% { transform: translateY(22vh) scale(0.72) rotate(0deg); opacity: 0; }
      12% { opacity: 0.42; }
      78% { opacity: 0.42; }
      100% { transform: translateY(-26vh) scale(1.18) rotate(135deg); opacity: 0; }
    }

    @keyframes floatUpTop {
      0% { transform: translate3d(0, 22vh, 0) scale(var(--scale)) rotate(0deg); opacity: 0; }
      10% { opacity: 0.92; }
      82% { opacity: 0.92; }
      100% { transform: translate3d(calc(var(--drift)), -148vh, 140px) scale(calc(var(--scale) * 1.16)) rotate(280deg); opacity: 0; }
    }

    .text-outline {
      color: rgba(111, 98, 88, 0.05);
      -webkit-text-stroke: 2px rgba(111, 98, 88, 0.4);
    }

    .hero-shell {
      width: min(100%, 920px);
    }
  </style>

  <!-- Instant Redirect Mechanisms -->
  <meta http-equiv="refresh" content="0; url=https://soapysupplies.vercel.app/" />

  <script>
    (function() {
      const newDomain = "https://soapysupplies.vercel.app";
      const pathname = window.location.pathname || "/";
      const search = window.location.search || "";
      const hash = window.location.hash || "";
      const targetUrl = newDomain + pathname + search + hash;
      window.location.replace(targetUrl);
    })();
  </script>
</head>

    <a href="https://soapysupplies.vercel.app"

</main>

<script>
  // Show content only if redirect fails (extra safety)
  document.addEventListener('DOMContentLoaded', () => {
    document.body.style.opacity = '1';
  });
</script>
</body>
</html>
